# AI Act Compass — nginx server block
# Single-page app served from /usr/share/nginx/html with sensible caching.

server {
    listen       80;
    listen       [::]:80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Security headers ──────────────────────────────────────────────
    # Permissive CSP allowing the runtime CDN scripts the app uses
    # (Tailwind Play CDN, Google Fonts, html2pdf, html2canvas).
    add_header X-Content-Type-Options    "nosniff"  always;
    add_header X-Frame-Options           "DENY"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Compression ───────────────────────────────────────────────────
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── Health check (Kubernetes / load balancer probes) ──────────────
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # ── Hashed assets — long-lived immutable cache ────────────────────
    # Vite emits /assets/*.<hash>.{js,css,...} which never change.
    location /assets/ {
        access_log        off;
        expires           1y;
        add_header        Cache-Control "public, max-age=31536000, immutable";
        try_files         $uri =404;
    }

    # ── Other static files (favicons, public root) ────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?|ttf|otf)$ {
        access_log        off;
        expires           7d;
        add_header        Cache-Control "public, max-age=604800";
        try_files         $uri =404;
    }

    # ── SPA fallback: all unmatched routes serve index.html ───────────
    # `index.html` itself must NOT be cached or users will see stale builds.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
        try_files  $uri $uri/ /index.html;
    }

    # ── Don't expose hidden files ─────────────────────────────────────
    location ~ /\. { deny all; access_log off; log_not_found off; }
}
