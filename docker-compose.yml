# Local production-like preview of AI Act Compass.
#
# Usage:
#   docker compose up --build
#   open http://localhost:8080
#
# For pure-dev hot reload, use `npm run dev` instead — this compose file
# is for sanity-testing the production image.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-act-compass:local
    container_name: ai-act-compass
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
